    <svg width="0" height="0">
  <filter id="noise">
    <feTurbulence type="fractalNoise"
                  baseFrequency="0.005"
                  numOctaves="3"
                  seed="2">
      <animate attributeName="baseFrequency"
               dur="20s"
               values="0.005;0.008;0.005"
               repeatCount="indefinite"/>
    </feTurbulence>
    <feColorMatrix type="saturate" values="1.5"/>
  </filter>
</svg>
